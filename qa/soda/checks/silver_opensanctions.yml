# silver.opensanctions — données sanctions OpenSanctions (~280k rows)
# Source : OpenSanctions (CC-BY 4.0).

checks for silver.opensanctions:
  - row_count between 250000 and 350000:
      name: row_count_in_expected_range
  - missing_count(entity_id) = 0:
      name: entity_id_not_null
  - duplicate_count(entity_id) = 0:
      name: no_duplicate_entity_id
  - freshness(loaded_at) < 7d:
      name: freshness_under_7d
