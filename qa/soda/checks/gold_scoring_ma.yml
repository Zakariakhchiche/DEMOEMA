# gold.scoring_ma — scoring M&A (~411k entreprises scorées 0-100)
# Build : gold.entreprises_master + signals → scoring déterministe.

checks for gold.scoring_ma:
  - row_count > 400000:
      name: row_count_above_400k
  - missing_count(deal_score) = 0:
      name: deal_score_not_null
  - duplicate_count(siren) = 0:
      name: no_duplicate_siren
  - invalid_count(deal_score) = 0:
      name: deal_score_in_range_0_100
      valid min: 0
      valid max: 100
  - freshness(scored_at) < 24h:
      name: freshness_under_24h
