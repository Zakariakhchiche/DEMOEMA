services:
  backend:
    build:
      context: ./backend
    container_name: demomea-backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - web

  frontend:
    build:
      context: ./frontend
    container_name: demomea-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - web

  caddy:
    image: caddy:2.8-alpine
    container_name: demomea-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
