services:
  backend:
    build:
      context: ./backend
    container_name: demomea-backend
    restart: unless-stopped
    # OLLAMA_BASE_URL, OLLAMA_API_KEY, OLLAMA_MODEL définis dans .env
    # (Ollama Cloud — pas de container local nécessaire).
    env_file: .env
    environment:
      # Cache partagé entre les 8 workers. Fallback in-memory si Redis indispo.
      - REDIS_URL=redis://demomea-redis:6379/0
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - web
      # Réseau du compose agents : indispensable pour résoudre demomea-datalake-db
      # (pool RO datalake). Sans ça, toute recréation du container casse le scoring
      # avec « pool non initialisé / Name or service not known ».
      - agents

  frontend:
    build:
      context: ./frontend
    container_name: demomea-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - web

  caddy:
    image: caddy:2.8-alpine
    container_name: demomea-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - web

  # Cache partagé (scalabilité) — bornes mémoire + éviction LRU. C'est un CACHE,
  # pas une base : aucune persistance requise, aucune perte de données possible
  # (l'app retombe sur Postgres si Redis tombe). Pas de port exposé à l'extérieur.
  redis:
    image: redis:7-alpine
    container_name: demomea-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    expose:
      - "6379"
    networks:
      - web

networks:
  web:
  # Réseau cree par docker-compose.agents.yml (DB datalake, agents-platform, neo4j).
  agents:
    external: true
    name: demoema-agents_agents-net

volumes:
  caddy_data:
  caddy_config:
