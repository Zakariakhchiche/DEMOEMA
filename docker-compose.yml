services:
  ollama:
    image: ollama/ollama:latest
    container_name: demomea-ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h  # garde le modèle chargé en RAM 24h après dernière requête
      - OLLAMA_NUM_PARALLEL=2   # 2 requêtes parallèles max (limite RAM)
    networks:
      - web

  backend:
    build:
      context: ./backend
    container_name: demomea-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Bascule LLM vers Ollama local (zero coût, zero clé API).
      # Le client deepseek.py détecte OLLAMA_BASE_URL et bypass deepseek.com.
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
    expose:
      - "8000"
    depends_on:
      - ollama
    networks:
      - web

  frontend:
    build:
      context: ./frontend
    container_name: demomea-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - web

  caddy:
    image: caddy:2.8-alpine
    container_name: demomea-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
  ollama_data:
