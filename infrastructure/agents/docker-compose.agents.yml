# DEMOEMA Agents Stack — Ollama Cloud Pro + Datalake Postgres dédié
# Lancement : docker compose -f docker-compose.agents.yml up -d
#
# `name:` épingle le project Compose à `demoema-agents`. Sans ça, le project
# dérive du dossier courant ("agents" si on lance depuis infrastructure/agents/,
# "demoema" depuis la racine), ce qui crée des networks et volumes différents
# à chaque invocation et casse la résolution DNS entre datalake-db et
# agents-platform — exactement le bug rencontré le 2026-04-27.
name: demoema-agents

services:
  datalake-db:
    image: postgres:16-alpine
    container_name: demomea-datalake-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: datalake
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATALAKE_POSTGRES_ROOT_PASSWORD}
      DATALAKE_AGENTS_PASSWORD: ${DATALAKE_AGENTS_PASSWORD}
      DATALAKE_RO_PASSWORD: ${DATALAKE_RO_PASSWORD}
    # Tuning Postgres calé sur le VPS IONOS post-migration (16 vCPU / 62 GB / NVMe).
    # Sans ces flags, l'image alpine tourne avec les defaults (shared_buffers=128MB,
    # maintenance_work_mem=64MB) — sur ce hardware ça gaspille 95% de la RAM
    # disponible et fait spiller chaque CREATE INDEX / REFRESH MV sur disque.
    # Mesuré : pg_restore à 7 GB/h en defaults vs 30+ GB/h avec ces flags.
    #
    # Les ALTER SYSTEM live (ALTER SYSTEM SET ... ; pg_reload_conf()) ont la même
    # effet pour les params SIGHUP-able, mais shared_buffers nécessite restart →
    # on bake les flags ici pour qu'ils survivent au prochain redémarrage.
    # Anti-zombie : 3 protections Postgres
    # - idle_in_transaction_session_timeout=900s (15min) : tue les sessions
    #   ayant une transaction ouverte sans activité (client mort pendant CREATE MV)
    # - statement_timeout=1800s (30min) : cap toute query (anomalie au-delà)
    # - tcp_keepalive (60s/10s/20×) : détecte les clients morts en ~5min
    #   au lieu des 2h default Linux → libère les locks plus vite
    command: >
      postgres
      -c shared_buffers=16GB
      -c effective_cache_size=46GB
      -c work_mem=256MB
      -c maintenance_work_mem=4GB
      -c max_worker_processes=16
      -c max_parallel_workers=12
      -c max_parallel_workers_per_gather=4
      -c max_parallel_maintenance_workers=4
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c checkpoint_completion_target=0.9
      -c wal_compression=on
      -c jit=on
      -c log_min_duration_statement=10000
      -c idle_in_transaction_session_timeout=900000
      -c statement_timeout=1800000
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=20
    volumes:
      - datalake-data:/var/lib/postgresql/data
      - ./datalake-init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    networks:
      - agents-net
    # 1 GB shared memory — utilisé par parallel workers (hash join, sort).
    # Default 64 MB est trop petit pour `max_parallel_workers_per_gather=4`
    # sur des big tables 30M+ rows.
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datalake"]
      interval: 10s
      timeout: 5s
      retries: 5

  agents-platform:
    build:
      context: ./platform
    container_name: demomea-agents-platform
    restart: unless-stopped
    depends_on:
      datalake-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PROMPTS_DIR: /app/prompts
      DOCS_DIR: /app/docs
      OPENCLAW_VAULT_DIR: /app/.secrets
      # DSN Postgres dérivée d'un seul mot de passe source-of-truth (le même
      # qui initialise datalake-db). Forme `${VAR:-default}` : si l'opérateur
      # définit DATABASE_URL dans son .env (ex: Postgres managé externe), sa
      # valeur est respectée. Sinon, dérivée depuis DATALAKE_POSTGRES_ROOT_PASSWORD.
      # Sans `:-default`, la valeur du compose OVERRIDE SILENCIEUSEMENT le .env
      # (precedence Compose : environment > env_file).
      DATABASE_URL: "${DATABASE_URL:-postgresql://postgres:${DATALAKE_POSTGRES_ROOT_PASSWORD}@datalake-db:5432/datalake}"
      # Tool-calling LLM pour silver_codegen + gold_codegen — donne au LLM
      # des tools READ-ONLY (introspect_table, find_column, dry_run_sql,
      # test_compile_create…) pour vérifier le schéma Postgres en direct
      # AVANT de produire le SQL final. Élimine ~80% des hallucinations
      # de colonnes. Off par défaut, on=1.
      CODEGEN_USE_TOOLS: "${CODEGEN_USE_TOOLS:-1}"
    volumes:
      - ./prompts:/app/prompts:ro
      - ./docs:/app/docs:ro
      # Hot-reload : fetchers générés par agent persistés sur host
      - ./platform/ingestion/sources:/app/ingestion/sources:rw
      - ./platform/ingestion/specs:/app/ingestion/specs:rw
      - ./platform/ingestion/engine.py:/app/ingestion/engine.py:rw
      - ./platform/ingestion/codegen.py:/app/ingestion/codegen.py:rw
      - ./platform/config.py:/app/config.py:rw
      - /root/inpi_dumps:/inpi_dumps:ro
      # Credentials store Fernet + vault key — persistés hors container
      - ./secrets:/app/.secrets:rw
      # Screenshots openclaw accessibles depuis host
      - ./screenshots:/tmp/openclaw_screenshots:rw
      # OSINT Maigret/Holehe : socket Docker + binaire CLI host pour spawner
      # les containers tools depuis l'orchestrator Python (`docker run --rm
      # soxoj/maigret:latest`). Le socket = équivalent root sur l'host —
      # accepté car agents-platform n'est pas exposé public et lit le
      # datalake interne uniquement. Le mount /usr/bin/docker évite d'avoir
      # à installer docker.io complet dans l'image (--no-install-recommends
      # skip le binaire CLI sur python:3.11-slim, et docker-ce-cli upstream
      # nécessite d'ajouter le repo Docker).
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      # OSINT scripts (osint_orchestrator.py + wrappers). Pas dans le build
      # context (./platform), monté en RO depuis le repo.
      - ./scripts:/app/scripts:ro
    expose:
      - "8100"
    networks:
      - agents-net
      - web              # accès via Caddy principal DEMOEMA

  # ── Neo4j Community : graphe relations dirigeants/companies + ICIJ + GLEIF
  # Use case M&A : "trouve tous les dirigeants Var avec lien à Panama Papers
  # via N degrés", non-faisable proprement en SQL pur. Le code de sync existe
  # dans neo4j_sync.py — ce service le réveille.
  neo4j:
    image: neo4j:5-community
    container_name: demomea-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-demoema_neo4j_pass}"
      NEO4J_server_memory_heap_initial__size: "2G"
      NEO4J_server_memory_heap_max__size: "4G"
      NEO4J_server_memory_pagecache_size: "2G"
      # Anti-zombie : ferme les sessions idle 10min (graphe perso, pas API)
      NEO4J_dbms_transaction_timeout: "600s"
    expose:
      - "7474"   # HTTP Browser (accès via tunnel SSH uniquement)
      - "7687"   # Bolt (depuis agents-platform sur le même network)
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - agents-net

networks:
  agents-net:
    driver: bridge
  web:
    external: true
    name: demoema_web

volumes:
  datalake-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
