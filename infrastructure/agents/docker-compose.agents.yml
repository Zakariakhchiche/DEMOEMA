# DEMOEMA Agents Stack — Ollama Cloud Pro + Datalake Postgres dédié
# Lancement : docker compose -f docker-compose.agents.yml up -d
#
# `name:` épingle le project Compose à `demoema-agents`. Sans ça, le project
# dérive du dossier courant ("agents" si on lance depuis infrastructure/agents/,
# "demoema" depuis la racine), ce qui crée des networks et volumes différents
# à chaque invocation et casse la résolution DNS entre datalake-db et
# agents-platform — exactement le bug rencontré le 2026-04-27.
name: demoema-agents

services:
  datalake-db:
    image: postgres:16-alpine
    container_name: demomea-datalake-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: datalake
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATALAKE_POSTGRES_ROOT_PASSWORD}
      DATALAKE_AGENTS_PASSWORD: ${DATALAKE_AGENTS_PASSWORD}
      DATALAKE_RO_PASSWORD: ${DATALAKE_RO_PASSWORD}
    volumes:
      - datalake-data:/var/lib/postgresql/data
      - ./datalake-init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    networks:
      - agents-net
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datalake"]
      interval: 10s
      timeout: 5s
      retries: 5

  agents-platform:
    build:
      context: ./platform
    container_name: demomea-agents-platform
    restart: unless-stopped
    depends_on:
      datalake-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PROMPTS_DIR: /app/prompts
      DOCS_DIR: /app/docs
      OPENCLAW_VAULT_DIR: /app/.secrets
      # DSN Postgres dérivée d'un seul mot de passe source-of-truth (le même
      # qui initialise datalake-db). Élimine la duplication DATABASE_URL ↔
      # POSTGRES_PASSWORD : impossible d'avoir un mismatch, et la migration
      # VPS n'exige plus qu'une variable .env (DATALAKE_POSTGRES_ROOT_PASSWORD)
      # pour que silver_engine + agents-platform se connectent.
      DATABASE_URL: "postgresql://postgres:${DATALAKE_POSTGRES_ROOT_PASSWORD}@datalake-db:5432/datalake"
    volumes:
      - ./prompts:/app/prompts:ro
      - ./docs:/app/docs:ro
      # Hot-reload : fetchers générés par agent persistés sur host
      - ./platform/ingestion/sources:/app/ingestion/sources:rw
      - ./platform/ingestion/specs:/app/ingestion/specs:rw
      - ./platform/ingestion/engine.py:/app/ingestion/engine.py:rw
      - ./platform/ingestion/codegen.py:/app/ingestion/codegen.py:rw
      - ./platform/config.py:/app/config.py:rw
      - /root/inpi_dumps:/inpi_dumps:ro
      # Credentials store Fernet + vault key — persistés hors container
      - ./secrets:/app/.secrets:rw
      # Screenshots openclaw accessibles depuis host
      - ./screenshots:/tmp/openclaw_screenshots:rw
    expose:
      - "8100"
    networks:
      - agents-net
      - web              # accès via Caddy principal DEMOEMA

networks:
  agents-net:
    driver: bridge
  web:
    external: true
    name: demoema_web

volumes:
  datalake-data:
    driver: local
