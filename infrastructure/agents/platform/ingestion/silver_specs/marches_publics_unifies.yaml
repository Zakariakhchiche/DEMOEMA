silver_name: silver.marches_publics_unifies
goal: >
  🔑 INTELLIGENCE ÉCONOMIQUE — marchés publics gagnés par siren via BOAMP
  (avis publiés) + DECP (données essentielles consolidées). Permet de calculer
  la dépendance commande publique d'une cible (red flag si > 50% CA) ou son
  positionnement secteur (cibles forts B2G).

source_tables:
  - bronze.boamp_avis_raw
  - bronze.decp_marches_raw

grain: "1 row par marché_uid (boamp_id ou decp_id)"

key_columns:
  - marche_uid
  - source_type
  - siren_titulaire
  - acheteur_public
  - date_notification
  - montant_eur
  - cpv_code

business_logic: |
  Unifie BOAMP (avis d'attribution) + DECP (données essentielles 2018+) en
  un schéma commun :

  source_type :
  - 'boamp' : avis d'attribution publiés (depuis bronze.boamp_avis_raw)
  - 'decp'  : données essentielles consolidées (depuis bronze.decp_marches_raw)
              — plus fiable, contient siren + montant explicites

  ⚠️ CLÉS RÉELLES (introspect 2026-06-14) : DECP a le SIRET dans
  'titulaire_id_1' (14 chiffres → siren = 9 premiers), PAS
  'titulaire_id_titulaire'/'siret_titulaire' (inexistants → ancien hotfix 0 ligne).
  acheteur = 'acheteur_nom', date = 'datenotification', cpv = 'codecpv'.
  BOAMP : acheteur = 'nomacheteur', date = 'dateparution' (titulaire = objet
  JSON → regex siren peu fiable, DECP suffit : 17,6k marchés, 10k sociétés).

  Champs unifiés :
  - siren_titulaire : siren entreprise gagnante
  - acheteur_public : nom de l'organisme adjudicateur (mairie, ministère, etc.)
  - date_notification : date d'attribution
  - montant_eur : montant TTC en euros (NULL si non précisé)
  - cpv_code : code CPV (Common Procurement Vocabulary) → secteur

  Cas d'usage scoring :
  - n_marches_publics_par_siren = count(*) groupé
  - total_montant_marches_par_siren = SUM(montant_eur)
  - is_dependant_commande_publique = (montant > 50% CA — à croiser avec inpi_comptes)
  - top_acheteurs_par_siren = top 5 acheteurs (concentration risk)

transformations: |
  WITH decp AS (
    SELECT (payload->>'id') || '|decp' AS marche_uid,
           'decp' AS source_type,
           CASE WHEN payload->>'titulaire_id_1' ~ '^[0-9]{14}$' THEN left(payload->>'titulaire_id_1', 9)
                WHEN payload->>'titulaire_id_1' ~ '^[0-9]{9}$'  THEN payload->>'titulaire_id_1'
                ELSE NULL END AS siren_titulaire,
           coalesce(NULLIF(payload->>'acheteur_nom',''), payload->>'acheteur_id') AS acheteur_public,
           CASE WHEN payload->>'datenotification' ~ '^\d{4}-\d{2}-\d{2}'
                THEN (left(payload->>'datenotification',10))::date ELSE NULL END AS date_notification,
           NULLIF(payload->>'montant', '')::numeric AS montant_eur,
           payload->>'codecpv' AS cpv_code,
           payload AS raw_payload
    FROM bronze.decp_marches_raw
  ),
  boamp AS (
    SELECT (payload->>'id') || '|boamp' AS marche_uid,
           'boamp' AS source_type,
           (regexp_match(payload->>'titulaire', '([0-9]{14}|[0-9]{9})'))[1] AS siret_raw,
           NULLIF(payload->>'nomacheteur','') AS acheteur_public,
           CASE WHEN payload->>'dateparution' ~ '^\d{4}-\d{2}-\d{2}'
                THEN (left(payload->>'dateparution',10))::date ELSE NULL END AS date_notification,
           NULL::numeric AS montant_eur,
           payload->>'descripteur_code' AS cpv_code,
           payload AS raw_payload
    FROM bronze.boamp_avis_raw
  ),
  boamp_clean AS (
    SELECT marche_uid, source_type,
           CASE WHEN length(siret_raw)=14 THEN left(siret_raw,9)
                WHEN length(siret_raw)=9  THEN siret_raw ELSE NULL END AS siren_titulaire,
           acheteur_public, date_notification, montant_eur, cpv_code, raw_payload
    FROM boamp
  )
  SELECT marche_uid, source_type, siren_titulaire, acheteur_public,
         date_notification, montant_eur, cpv_code, raw_payload
  FROM decp WHERE siren_titulaire IS NOT NULL
  UNION ALL
  SELECT marche_uid, source_type, siren_titulaire, acheteur_public,
         date_notification, montant_eur, cpv_code, raw_payload
  FROM boamp_clean WHERE siren_titulaire IS NOT NULL;

indexes:
  - "siren_titulaire"
  - "date_notification DESC"
  - "cpv_code"
  - "(siren_titulaire, date_notification DESC)"
  - "lower(acheteur_public)"

refresh_trigger: "interval_hours=24"
sla_minutes: 1440
