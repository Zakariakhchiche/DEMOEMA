silver_name: silver.dirigeants_360
goal: >
  🔑 FEATURE STORE 360° DIRIGEANT pour le scoring M&A. Un row par
  dirigeant individu (clé person_uid) avec TOUS les signaux croisés :
  mandats, SCI/patrimoine, financier consolidé, réseau co-mandataires,
  événements BODACC sur ses sociétés, contentieux, sanctions, presse,
  présence digitale OSINT. Pendant person-level du silver.entreprises_signals.

source_tables:
  - silver.inpi_dirigeants
  - silver.dirigeant_sci_patrimoine
  - silver.inpi_comptes
  - silver.bodacc_annonces
  - silver.cession_events
  - silver.judilibre_decisions
  - silver.opensanctions
  - silver.osint_persons_enriched
  - silver.press_mentions_matched

grain: "1 row par (nom, prenom, date_naissance) — clé naturelle dirigeant"

key_columns:
  - nom
  - prenom
  - date_naissance
  - n_mandats_actifs

business_logic: |
  CTE de base : silver.inpi_dirigeants (8M dirigeants).

  IMPORTANT — silver.inpi_dirigeants colonnes existantes (verifie via introspect) :
    nom (text), prenom (text), date_naissance (varchar 10),
    n_mandats_total, n_mandats_actifs (bigint),
    sirens_mandats (bpchar[]), denominations (text[]), formes_juridiques (text[]),
    n_sci, sci_sirens (bpchar[]), total_capital_sci (numeric),
    is_multi_mandat (boolean), roles (text[]), age_2026 (integer),
    first_mandat_date, last_mandat_date (date), materialized_at.
  ⚠️ PAS de colonne person_uid, ni prenoms (pluriel), ni denominations_mandats.

  FEATURES par catégorie :

  [Identité — 0pts directs, mais clés du graphe]
  - nom, prenom, date_naissance — clé composite
  - person_uid_calc = md5(coalesce(nom,'') || '|' || coalesce(prenom,'') || '|' || coalesce(date_naissance,''))
    (calcule a la volee — pas une colonne source)
  - age_2026 (deja present comme colonne)
  - full_name = prenom || ' ' || nom

  [Mandats — 10pts]
  - n_mandats_actifs (depuis silver.inpi_dirigeants)
  - sirens_mandats (array — toutes les sociétés où il a un mandat actif)
  - denominations_mandats (array — noms des sociétés)
  - is_multi_mandat = (n_mandats_actifs >= 5)
  - is_pro_ma = (n_mandats_actifs >= 10)

  [Patrimoine SCI — 20pts]
  - n_sci (depuis silver.dirigeant_sci_patrimoine via JOIN sur nom+prenom+dob)
  - sci_sirens (array)
  - total_capital_sci (somme capital social SCI)
  - first_sci_date
  - has_holding_patrimoniale = (n_sci >= 2)
  - patrimoine_estime = total_capital_sci + somme capital_main_companies

  [Financier consolidé — 15pts]
  - n_companies = array_length(sirens_mandats, 1)
  - ca_total = SUM(ca dernier exercice de chaque société via silver.inpi_comptes)
  - capital_total_companies = SUM(montant_capital de ses entreprises)
  - resultat_net_total
  - has_bilan_recent = EXISTS bilan < 2 ans
  - n_exercices_total = count distinct bilans

  [Réseau / Co-mandataires — 10pts]
  - co_mandataires (array de other_person_uid avec lesquels >= 2 sociétés en commun)
  - n_co_mandataires = array_length(co_mandataires, 1)
  - has_strong_network = (n_co_mandataires >= 3)
  - Calcul : silver.inpi_dirigeants self-join sur intersection sirens_mandats >= 2

  [Événements BODACC — 5pts]
  - n_bodacc_cessions = count silver.cession_events where siren in sirens_mandats AND is_recent
  - has_cession_recente = (n_bodacc_cessions > 0)
  - n_bodacc_difficultes = count silver.bodacc_annonces type='procedure_collective'
                           sur ses sociétés
  - has_difficultes_recentes (90j)

  [Légal / Contentieux — -10pts négatif]
  - n_jugements = count silver.judilibre_decisions WHERE titre ILIKE '%nom prenom%'
                  OR titre ILIKE '%denomination%' (pour ses sociétés)
  - has_contentieux_recent (< 2 ans)

  [Sanctions — -20pts négatif]
  - is_sanctionne = EXISTS silver.opensanctions WHERE name_lower ILIKE '%nom prenom%'
  - sanction_programs (array si match)

  [Presse — 5pts]
  - n_press_mentions_90d = count silver.press_mentions_matched
                           where siren in sirens_mandats AND published_at > now()-90d
  - has_press_buzz = (n_press_mentions_90d >= 3)

  [Digital / OSINT — 5pts]
  - has_linkedin (depuis silver.osint_persons_enriched si match)
  - has_github
  - n_total_social
  - digital_presence_score (0-100)

  [Score composite — 0-100]
  - pro_ma_score = LEAST(100,
        (CASE WHEN is_pro_ma THEN 10 ELSE 0 END)
      + (CASE WHEN has_holding_patrimoniale THEN 20 ELSE 0 END)
      + (LEAST(15, ca_total / 10000000.0))     -- 15pts si CA total > 100M€
      + (LEAST(10, n_co_mandataires))           -- 1pt par co-mandataire jusqu'à 10
      + (CASE WHEN has_cession_recente THEN 5 ELSE 0 END)
      - (CASE WHEN has_difficultes_recentes THEN 10 ELSE 0 END)
      - (CASE WHEN is_sanctionne THEN 20 ELSE 0 END)
      + (CASE WHEN has_press_buzz THEN 5 ELSE 0 END)
      + (LEAST(5, n_total_social))
    )

transformations: |
  CTE etages pour la performance. Utilise UNIQUEMENT les colonnes
  existantes de silver.inpi_dirigeants (cf. introspect + section au-dessus).

  WITH base AS (
    SELECT
      md5(coalesce(nom,'') || '|' || coalesce(prenom,'') || '|' || coalesce(date_naissance,'')) AS person_uid_calc,
      nom, prenom, date_naissance, age_2026,
      sirens_mandats, denominations, formes_juridiques, roles,
      n_mandats_actifs, n_mandats_total, is_multi_mandat,
      first_mandat_date, last_mandat_date,
      n_sci, sci_sirens, total_capital_sci,
      array_length(sirens_mandats, 1) AS n_companies
    FROM silver.inpi_dirigeants
    WHERE nom IS NOT NULL AND prenom IS NOT NULL
  ),
  with_sci AS (
    -- silver.dirigeant_sci_patrimoine join sur (nom, prenom, date_naissance)
    SELECT b.*,
           sci.n_sci AS sci_n_sci,
           sci.total_capital_sci AS sci_total_capital,
           sci.sci_denominations,
           sci.sci_code_postaux,
           sci.first_sci_date
    FROM base b
    LEFT JOIN silver.dirigeant_sci_patrimoine sci
      ON UPPER(unaccent(sci.nom)) = UPPER(unaccent(b.nom))
     AND UPPER(unaccent(sci.prenom)) = UPPER(unaccent(b.prenom))
     AND COALESCE(sci.date_naissance,'') = COALESCE(b.date_naissance,'')
  ),
  with_finances AS (
    SELECT ws.*,
           (SELECT SUM(c.ca_net) FROM silver.inpi_comptes c
            WHERE c.siren = ANY(ws.sirens_mandats)) AS ca_total,
           (SELECT SUM(c.resultat_net) FROM silver.inpi_comptes c
            WHERE c.siren = ANY(ws.sirens_mandats)) AS resultat_net_total,
           (SELECT count(DISTINCT c.siren) FROM silver.inpi_comptes c
            WHERE c.siren = ANY(ws.sirens_mandats)
              AND c.date_cloture > CURRENT_DATE - INTERVAL '24 months') AS n_companies_avec_bilan_recent
    FROM with_sci ws
  ),
  with_sanctions AS (
    SELECT wf.*,
           EXISTS(
             SELECT 1 FROM silver.opensanctions s
             WHERE s.schema = 'Person'
               AND UPPER(unaccent(s.name)) ILIKE '%' || UPPER(unaccent(wf.nom)) || '%'
               AND UPPER(unaccent(s.name)) ILIKE '%' || UPPER(unaccent(wf.prenom)) || '%'
               AND LENGTH(wf.nom) > 2 AND LENGTH(wf.prenom) > 2
           ) AS is_sanctionne
    FROM with_finances wf
  ),
  with_osint AS (
    SELECT ws.*,
           os.has_linkedin, os.has_github, os.has_any_social,
           os.n_linkedin, os.n_github, os.n_twitter,
           os.n_total_social,
           os.denomination_main_company AS osint_main_deno,
           os.last_scanned_at AS osint_scanned_at
    FROM with_sanctions ws
    LEFT JOIN silver.osint_persons_enriched os
      ON UPPER(unaccent(os.nom)) = UPPER(unaccent(ws.nom))
     AND ws.prenom = ANY(os.prenoms)
     AND COALESCE(os.date_naissance,'') = COALESCE(ws.date_naissance,'')
  )
  SELECT
    person_uid_calc AS person_uid,
    nom, prenom, date_naissance, age_2026,
    sirens_mandats, denominations, formes_juridiques, roles,
    n_mandats_actifs, n_mandats_total, is_multi_mandat,
    first_mandat_date, last_mandat_date,
    sci_n_sci AS n_sci, sci_total_capital AS total_capital_sci,
    sci_denominations, sci_code_postaux, first_sci_date,
    n_companies, n_companies_avec_bilan_recent,
    ca_total, resultat_net_total,
    is_sanctionne,
    has_linkedin, has_github, has_any_social,
    n_linkedin, n_github, n_twitter, n_total_social,
    osint_main_deno, osint_scanned_at,
    -- Score composite simplifie (sans sub-queries qui pourraient timeout)
    LEAST(100,
      (CASE WHEN n_mandats_actifs >= 10 THEN 10 ELSE 0 END) +
      (CASE WHEN sci_n_sci >= 2 THEN 20 ELSE 0 END) +
      LEAST(15, COALESCE(ca_total, 0) / 10000000.0)::int +
      (CASE WHEN n_total_social >= 3 THEN 5 ELSE 0 END) -
      (CASE WHEN is_sanctionne THEN 20 ELSE 0 END)
    )::int AS pro_ma_score,
    NOW() AS materialized_at
  FROM with_osint;

  Performance : 8M dirigeants × 4 sub-queries simples = 5-10 min refresh.

indexes:
  - "(nom, prenom, date_naissance)"
  - "pro_ma_score DESC"
  - "n_mandats_actifs DESC"
  - "total_capital_sci DESC"
  - "is_sanctionne WHERE is_sanctionne = true"
  - "sirens_mandats USING gin"
  - nom

refresh_trigger: "interval_hours=24"
sla_minutes: 1500
