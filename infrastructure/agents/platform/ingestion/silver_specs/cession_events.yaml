silver_name: silver.cession_events
goal: >
  Événements BODACC de type cession/vente fonds/dissolution extraits et enrichis.
  Killer feature "alerte pré-cession" — permet de détecter en temps réel les
  annonces de cession pour sourcing M&A. Dimension "Signaux patrimoniaux" +20pts.

source_tables:
  - bronze.bodacc_annonces_raw
  - bronze.inpi_formalites_entreprises

grain: "1 row par annonce de cession BODACC"

key_columns:
  - annonce_id
  - siren
  - date_parution
  - type_cession

business_logic: |
  ⚠️ VALEURS RÉELLES (introspect bronze.bodacc_annonces_raw 2026-06-14) :
    familleavis_lib contient des LIBELLÉS FR ('Ventes et cessions',
    'Procédures collectives', 'Procédures de conciliation',
    'Procédures de rétablissement professionnel'), PAS 'procol'/'cession'.
    type_avis = 'annonce'/'rectificatif'/'annulation' (jamais '%cession%').
    L'ancien hotfix filtrait sur des valeurs inexistantes → 0 ligne.

  Filtre = familleavis_lib IN (les 4 libellés ci-dessus).

  - annonce_id : colonne b.annonce_id
  - date_parution : colonne b.date_publication
  - siren : extrait du registre (pattern silver.bodacc_annonces) :
    regexp_replace(split_part(payload->>'registre', ',', -1), '[^0-9]','','g')
    → NULL si pas 9 chiffres. ~92% de couverture.
  - type_cession (CASE sur familleavis_lib) :
    'Ventes et cessions' → 'vente_cession' ;
    'Procédures collectives' → 'procedure_collective' ;
    'Procédures de conciliation' → 'conciliation' ;
    'Procédures de rétablissement professionnel' → 'retablissement'.

  Enrichissement via gold.entreprises_master (411k, indexé — PAS
  inpi_formalites_entreprises 27M qui fait exploser le temps de build) :
  - denomination_inpi, forme_juridique_inpi, code_ape_inpi, cp_inpi

  Signal actionnable : is_recent = (date_parution >= now() - interval '90 days').

transformations: |
  LEFT JOIN gold.entreprises_master em ON em.siren = siren_extrait
  WHERE type_cession <> 'cession_autre'.

indexes:
  - annonce_id
  - "siren, date_parution DESC"
  - type_cession
  - "date_parution DESC"
  - "is_recent WHERE is_recent = true"

refresh_trigger: "interval_hours=1"   # killer feature — fraîcheur élevée
sla_minutes: 120
