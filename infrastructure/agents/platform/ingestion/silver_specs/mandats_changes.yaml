silver_name: silver.mandats_changes
goal: >
  🔑 CHRONOLOGIE DES CHANGEMENTS DE MANDATS — détecte les rotations dirigeants
  via inpi_formalites_historique : nominations, démissions, cooptations.
  Permet de repérer les "rotations précédant cession" (signal pré-M&A) ou
  les "stabilisations" post-acquisition.

source_tables:
  - bronze.inpi_formalites_historique
  - bronze.inpi_formalites_personnes
  - silver.inpi_dirigeants

grain: "1 row par changement de mandat (siren × person_uid × type_evenement × date)"

key_columns:
  - change_uid
  - siren
  - person_uid
  - type_evenement
  - date_evenement
  - role_avant
  - role_apres

business_logic: |
  ⚠️ CLÉS PAYLOAD RÉELLES (introspect bronze.inpi_formalites_historique 2026-06-14) :
    Le payload est le RNE INPI converti — les clés sont 'codeEvenement'
    (ex 34M/35M = "Modification relative aux dirigeants"), 'libelleEvenement',
    'dateEffet', 'dateIntegration'. PAS de 'type_evenement'/'libelle'/'date_creation'
    (ancien hotfix : filtrait sur des clés inexistantes → 0 ligne).

  ⚠️ COLONNES bronze.inpi_formalites_personnes : individu_nom, individu_prenoms
    (text[]), individu_date_naissance, individu_role, formality_id.

  Signal mandat = formalités dont libelleEvenement ILIKE '%dirigeant%'
  (codes 34M "Modification relative aux dirigeants d'une société",
  35M "... d'une SA", etc.). ~285k événements sur 9,5 M formalités.

  type_evenement = 'changement_dirigeant' (le libellé RNE ne distingue pas
  nomination/démission ; la nuance vient de role_avant/role_apres via lag()
  sur individu_role joint depuis inpi_formalites_personnes).

  date_evenement = payload->>'dateEffet' (sinon date_integration).

  Cas d'usage scoring :
  - n_changes_recent_par_siren = count WHERE siren = X AND
    date_evenement > now() - interval '12 months'
  - is_rotation_dirigeants = (n_changes_recent >= 3 dans 90 jours)

transformations: |
  WITH formalites AS (
    SELECT h.formality_id,
           h.siren,
           CASE WHEN h.payload->>'dateEffet' ~ '^\d{4}-\d{2}-\d{2}'
                THEN (left(h.payload->>'dateEffet', 10))::date
                ELSE h.date_integration::date END AS date_evenement,
           h.payload->>'libelleEvenement' AS libelle,
           h.payload->>'codeEvenement'    AS code_evenement,
           h.payload AS raw_payload
    FROM bronze.inpi_formalites_historique h
    WHERE h.payload->>'libelleEvenement' ILIKE '%dirigeant%'
  ),
  with_person AS (
    SELECT f.*,
           'changement_dirigeant'::text AS type_evenement,
           p.individu_nom AS nom, p.individu_prenoms[1] AS prenom,
           p.individu_date_naissance AS date_naissance,
           md5(coalesce(p.individu_nom,'')||'|'||coalesce(p.individu_prenoms[1],'')||'|'||coalesce(p.individu_date_naissance::text,'')) AS person_uid,
           p.individu_role AS role_apres,
           lag(p.individu_role) OVER (PARTITION BY f.siren, p.individu_nom, p.individu_prenoms[1]
                             ORDER BY f.date_evenement) AS role_avant
    FROM formalites f
    LEFT JOIN bronze.inpi_formalites_personnes p
      ON p.formality_id = f.formality_id
  )
  SELECT
    md5(coalesce(siren,'') || '|' || coalesce(person_uid, '') || '|' || type_evenement || '|' || coalesce(date_evenement::text,'')) AS change_uid,
    siren,
    person_uid,
    type_evenement,
    date_evenement,
    code_evenement,
    role_avant,
    role_apres,
    raw_payload
  FROM with_person
  WHERE siren IS NOT NULL;

indexes:
  - "siren"
  - "person_uid WHERE person_uid IS NOT NULL"
  - "type_evenement"
  - "date_evenement DESC"
  - "(siren, date_evenement DESC)"
  - "(person_uid, date_evenement DESC) WHERE person_uid IS NOT NULL"

refresh_trigger: "interval_hours=24"
sla_minutes: 2880
