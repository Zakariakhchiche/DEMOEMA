source_id: cnil_sanctions
source_num: 36
layer: 6
couche: Juridique
name: CNIL sanctions — amendes RGPD
description: 'Source open data data.gouv.fr — sanctions formelles prononcées par
  la formation restreinte de la CNIL (RGPD). Slug data.gouv:
  "sanctions-prononcees-par-la-cnil". À chaque refresh, lire les resources du
  dataset (CSV) puis ingérer en bronze.cnil_sanctions_raw.'
endpoint: https://www.data.gouv.fr/api/1/datasets/sanctions-prononcees-par-la-cnil/
auth: none
pattern: data_gouv_dataset_csv
refresh_trigger: interval_hours=168
sla_minutes: 10140
license: Etalab 2.0 (libre réutilisation commerciale)
bronze_table: bronze.cnil_sanctions_raw
bronze_fields:
- name: sanction_id
  type: VARCHAR(64)
  primary_key: true
- name: entite
  type: VARCHAR(512)
  primary_key: false
- name: siren
  type: CHAR(9)
  primary_key: false
- name: date_sanction
  type: DATE
  primary_key: false
- name: montant
  type: NUMERIC
  primary_key: false
- name: motif
  type: TEXT
  primary_key: false
conflict_strategy: ON CONFLICT (sanction_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
