source_id: dila_bocc
name: DILA BOCC — Bulletin Officiel des Conventions Collectives
layer: bronze
pattern: bulk_archive_xml
format: tar_gz_xml

# BOCC utilise FluxAnneeCourante/ avec extension .taz (= tar.gz alias)
endpoint: https://echanges.dila.gouv.fr/OPENDATA/BOCC/FluxAnneeCourante/

description: >
  Bulletin Officiel des Conventions Collectives : avenants et accords
  collectifs publiés. Complète KALI (corpus consolidé) avec le flux annuel
  des nouvelles publications.

  Format : CCOYYYYNNNN.complet.taz (tar.gz avec ext alternative .taz).

table: bronze.bocc_avenants_raw
key_field: bocc_id

template_vars:
  bulk_url_pattern: 'CCO\d+\.complet\.taz'
  xml_member_pattern: '\.xml$'
  xml_xpath_id: ".//META_COMMUN/ID"
  max_archives: 50
  max_rows: 50000
  batch_size: 500
  archive_parallelism: 2

refresh_trigger: "cron=0 11 * * 1"
sla_minutes: 4320
licence: Etalab 2.0
