source_id: amf_listes_noires
source_num: 81
layer: 12
couche: Compliance
name: AMF listes noires — entités non autorisées
description: 'Source open data data.gouv.fr — listes noires AMF des entités non
  autorisées à proposer produits/services financiers en France. Slug data.gouv:
  "listes-noires-des-entites-non-autorisees-a-proposer-des-produits-ou-services-financiers-en-france".
  CSV téléchargé via l''API resources puis ingéré en bronze.amf_listes_noires_raw.'
endpoint: https://www.data.gouv.fr/api/1/datasets/listes-noires-des-entites-non-autorisees-a-proposer-des-produits-ou-services-financiers-en-france/
auth: none
pattern: data_gouv_dataset_csv
refresh_trigger: interval_hours=24
sla_minutes: 1440
license: Etalab 2.0 (libre réutilisation commerciale)
bronze_table: bronze.amf_listes_noires_raw
bronze_fields:
- name: entite_id
  type: VARCHAR(64)
  primary_key: true
- name: denomination
  type: VARCHAR(512)
  primary_key: false
- name: type_alerte
  type: VARCHAR(64)
  primary_key: false
- name: date_alerte
  type: DATE
  primary_key: false
conflict_strategy: ON CONFLICT (entite_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
