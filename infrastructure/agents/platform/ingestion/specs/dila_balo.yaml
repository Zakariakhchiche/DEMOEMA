source_id: dila_balo
name: DILA BALO — Bulletin des Annonces Légales Obligatoires (sociétés cotées)
layer: bronze
pattern: bulk_archive_xml
format: tar_gz_xml

# BALO est organisé par année (FluxHistorique/{year}/) — on pointe sur la dernière
# année dispo. Pour backfill complet historique : il faudra itérer 2005..2025.
endpoint: https://echanges.dila.gouv.fr/OPENDATA/BALO/FluxHistorique/2025/

description: >
  Bulletin des Annonces Légales Obligatoires : convocations AG, comptes annuels
  publiés, OPA, rachats actions, augmentations capital, dividendes. Sociétés
  cotées et grandes entreprises.

  CRITIQUE POUR M&A : signaux d'opérations capitalistiques en temps quasi réel.

  Format : 1 archive {year}.tar.gz par année (5+ GB pour année récente).

table: bronze.balo_announcements_raw
key_field: announcement_id

template_vars:
  bulk_url_pattern: '\d{4}\.tar\.gz'
  xml_member_pattern: '\.xml$'
  xml_xpath_id: ".//META_COMMUN/ID"
  max_archives: 5  # 5 dernières années (2021-2025) si on bumpe le endpoint
  max_rows: 200000
  batch_size: 500
  archive_parallelism: 2

refresh_trigger: "cron=0 8 * * 1"
sla_minutes: 4320
licence: Etalab 2.0
