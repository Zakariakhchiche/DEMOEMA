source_id: dila_capp
name: DILA Capp — Cours d'appel (judiciaires)
layer: bronze
pattern: bulk_archive_xml
format: tar_gz_xml

endpoint: https://echanges.dila.gouv.fr/OPENDATA/CAPP/FluxHistorique/

secondary_endpoints:
  - https://echanges.dila.gouv.fr/OPENDATA/CAPP/FluxAnneeCourante/

description: >
  Décisions des Cours d'appel judiciaires françaises. Source DILA OpenData.
  ~200K décisions historiques. Les noms d'archives suivent CAPP_YYYYMMDD.tar.gz.

table: bronze.juri_capp_raw
key_field: decision_id

template_vars:
  bulk_url_pattern: 'CAPP_\d{8}\.tar\.gz'
  xml_member_pattern: '\.xml$'
  xml_xpath_id: ".//META_COMMUN/ID"
  max_archives: 100
  max_rows: 300000
  batch_size: 500
  archive_parallelism: 4

refresh_trigger: "cron=0 8 * * 1"
sla_minutes: 4320
licence: Etalab 2.0
