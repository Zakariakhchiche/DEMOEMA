# ═══════════════════════════════════════════════════════════════════
#  PROTOTYPE SQL — COMPUTE deal_score / tier / valuation
# ═══════════════════════════════════════════════════════════════════

scoring_sql_excerpt: |

  -- Materialized view body (extract)
  WITH base AS (
    SELECT * FROM silver.sci_master
  ),
  bodacc_agg AS (
    SELECT siren,
           count(*) FILTER (WHERE date_parution >= now() - interval '24 months') AS bodacc_n_events_24m,
           bool_or(type_avis ILIKE '%cession%') AS bodacc_has_cession_event,
           bool_or(type_avis ILIKE '%dirigeant%') AS bodacc_has_modif_dirigeant_event,
           max(date_parution) AS bodacc_last_event_date
    FROM silver.bodacc_annonces
    WHERE date_parution >= now() - interval '24 months'
    GROUP BY siren
  ),
  scored AS (
    SELECT
      b.*,
      -- 6 axes 0-100
      ROUND(LEAST(100, GREATEST(0,
        20 * (LOG(GREATEST(b.patrimoine_net_estime, 1) + 1) - LOG(100000))
        / NULLIF(LOG(50000000) - LOG(100000), 0)
      ))) AS patrimoine_net_score,
      CASE
        WHEN b.age_dirigeant_max >= 70 THEN 90
        WHEN b.age_dirigeant_max >= 60 AND b.has_successeur THEN 80
        WHEN b.age_dirigeant_max >= 60 THEN 70
        WHEN b.age_dirigeant_max >= 50 THEN 50
        ELSE 30
      END AS transmission_score,
      CASE
        WHEN b.has_sanction OR b.has_offshore_match OR b.has_judilibre_decision THEN 0
        WHEN b.has_late_filing OR b.has_radiation_recent THEN 50
        ELSE 100
      END AS compliance_score,
      CASE
        WHEN b.ownership_type = 'individual' THEN 95
        WHEN b.ownership_type = 'mixed' THEN 70
        WHEN b.ownership_type = 'corporate' AND NOT b.has_holding_parent THEN 60
        WHEN b.ownership_type = 'corporate' AND b.has_holding_parent THEN 40
        ELSE 50
      END AS structure_score,
      ROUND(LEAST(100, GREATEST(0,
        100 * COALESCE(b.ca_net / NULLIF(b.total_actif, 0), 0)
      ))) AS liquidite_score,
      LEAST(100, COALESCE(array_length(b.adresse_code_postal_distincts, 1), 1) * 25) AS diversification_geo_score
    FROM base b
    LEFT JOIN bodacc_agg ba ON ba.siren = b.siren
  ),
  composite AS (
    SELECT *,
      ROUND(
        0.30 * patrimoine_net_score
      + 0.20 * transmission_score
      + 0.15 * compliance_score
      + 0.15 * structure_score
      + 0.10 * liquidite_score
      + 0.10 * diversification_geo_score
      ) AS deal_score
    FROM scored
  )
  SELECT *,
    CASE
      WHEN deal_score >= 80 THEN 'A_HOT'
      WHEN deal_score >= 60 THEN 'B_WARM'
      WHEN deal_score >= 40 THEN 'C_PIPELINE'
      WHEN deal_score >= 20 THEN 'D_WATCH'
      ELSE 'E_REJECT'
    END AS tier,
    CASE
      WHEN ownership_type = 'individual' THEN COALESCE(patrimoine_net_estime, 0) * 1.0
      WHEN ownership_type = 'corporate' THEN COALESCE(patrimoine_net_estime, 0) * 1.2
      WHEN ownership_type = 'mixed' THEN COALESCE(patrimoine_net_estime, 0) * 1.1
      ELSE COALESCE(patrimoine_net_estime, 0)
    END AS valuation_estimee_eur
  FROM composite
