#  INDEXES
# ═══════════════════════════════════════════════════════════════════

indexes:
  - siren                                          # PK lookup direct
  - "patrimoine_net_estime DESC NULLS LAST"        # top patrimoine
  - "deal_score DESC"                              # top M&A targets
  - tier                                           # filtre tier
  - ownership_type                                 # filtre individual/corporate
  - adresse_dept                                   # filtre géo
  - "is_sci"                                       # boolean partiel
  - "GIN(dirigeants_individus_uids)"               # search par dirigeant
  - "GIN(parent_sirens)"                           # search par groupe parent

refresh_trigger: "interval_hours=24"
sla_minutes: 1500


