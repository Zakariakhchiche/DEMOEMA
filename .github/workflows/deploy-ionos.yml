name: Deploy to IONOS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/agents/**'
      - 'infrastructure/dbt/**'
      - '.github/workflows/deploy-ionos.yml'
  workflow_dispatch:
    inputs:
      component:
        description: 'Which component to deploy'
        type: choice
        options: [all, backend, frontend, agents]
        default: all

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-ionos-${{ github.event.inputs.component || 'all' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.IONOS_DEPLOY_KEY }}

      - name: Known hosts
        # ssh-keyscan vise l'IP directement : le DNS demoema.fr n'est pas
        # garanti pointer vers le VPS prod (autres environnements possibles).
        # IONOS_VPS_HOST_IP est paramétrable côté secrets pour la migration.
        env:
          VPS_HOST_IP: ${{ secrets.IONOS_VPS_HOST_IP || '82.165.242.205' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST_IP" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.IONOS_VPS_USER_HOST || 'root@82.165.242.205' }}
          COMPONENT: ${{ github.event.inputs.component || 'all' }}
        run: |
          chmod +x infrastructure/scripts/deploy.sh
          infrastructure/scripts/deploy.sh "$COMPONENT" "${GITHUB_SHA}"

      - name: Post-deploy smoke tests
        # Le smoke test interroge api.demoema.fr quand le DNS est configuré ;
        # sinon on tape directement la healthz côté agents-platform via le VPS.
        env:
          VPS_HOST_IP: ${{ secrets.IONOS_VPS_HOST_IP || '82.165.242.205' }}
        run: |
          if curl -fsSL --max-time 10 https://api.demoema.fr/healthz >/dev/null 2>&1; then
            echo "✅ api.demoema.fr healthz OK"
          else
            echo "ℹ️  api.demoema.fr unreachable (DNS not configured yet?) — skipping public smoke"
          fi

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "🚨 Deploy IONOS failed on ${{ github.sha }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
