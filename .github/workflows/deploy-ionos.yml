name: Deploy to IONOS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/agents/**'
      - 'infrastructure/dbt/**'
      - '.github/workflows/deploy-ionos.yml'
  workflow_dispatch:
    inputs:
      component:
        description: 'Which component to deploy'
        type: choice
        options: [all, backend, frontend, agents]
        default: all

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-ionos-${{ github.event.inputs.component || 'all' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.IONOS_DEPLOY_KEY }}

      - name: Known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H demoema.fr >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: deploy@demoema.fr
          COMPONENT: ${{ github.event.inputs.component || 'all' }}
        run: |
          chmod +x infrastructure/scripts/deploy.sh
          infrastructure/scripts/deploy.sh "$COMPONENT" "${GITHUB_SHA}"

      - name: Post-deploy smoke tests
        run: |
          curl -fsSL https://api.demoema.fr/healthz
          curl -fsSL https://demoema.fr/ -o /dev/null -w "web HTTP %{http_code}\n"

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "🚨 Deploy IONOS failed on ${{ github.sha }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
