default_language_version:
  python: python3.12

repos:
  # Generic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(infrastructure/agents/.*\.ya?ml|\.github/workflows/)
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python — ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Python — mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^backend/(?!tests/|migrations/)
        additional_dependencies:
          - pydantic>=2.6
          - pydantic-settings>=2.6
          - types-requests

  # Frontend — eslint + prettier via npm (fast path)
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint --if-present'
        language: system
        files: ^frontend/(src|.*\.(ts|tsx|js|jsx|mjs|cjs|json))$
        pass_filenames: false

  # Secrets — gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['-x']

  # Dockerfile lint
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.0-beta
    hooks:
      - id: hadolint-docker
        args: ['--ignore', 'DL3008', '--ignore', 'DL3059']

ci:
  autofix_commit_msg: |
    chore(pre-commit): auto-fix from hooks
  autofix_prs: true
  autoupdate_schedule: weekly
